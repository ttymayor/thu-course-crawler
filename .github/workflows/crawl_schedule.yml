name: crawl_schedule

on:
  workflow_dispatch:
    inputs:
      db_env:
        description: MongoDB collection environment
        required: true
        default: prod
        type: choice
        options:
          - prod
          - dev
      academic_year:
        description: Academic year to crawl
        required: true
        default: "115"
        type: string
      academic_semester:
        description: Academic semester to crawl
        required: true
        default: "1"
        type: choice
        options:
          - "1"
          - "2"

jobs:
  crawl-schedule:
    name: crawl_schedule
    runs-on: ubuntu-latest
    env:
      DB_URI: ${{ secrets.DB_URI }}
      DB_NAME: ${{ secrets.DB_NAME || 'thu_course' }}
      DB_ENV: ${{ inputs.db_env }}
      ACADEMIC_YEAR: ${{ inputs.academic_year }}
      ACADEMIC_SEMESTER: ${{ inputs.academic_semester }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv sync --locked

      - name: Run schedule crawler
        run: |
          uv run crawl_schedule.py
